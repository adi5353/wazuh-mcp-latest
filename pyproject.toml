[project]
name = "wazuh-mcp"
version = "0.1.0"
description = "MCP server exposing Wazuh manager and indexer to LLM clients"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.2.0",
    "httpx>=0.27.0",
]

[project.scripts]
wazuh-mcp = "wazuh_mcp.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["wazuh_mcp*"]
