###############################################################################
# Wazuh MCP — Demo Environment  (Wazuh 4.14.5)
#
# Spins up a full Wazuh single-node stack + the MCP server pre-configured.
#
# Usage:
#   docker compose up -d                          # start all services
#   docker compose --profile seed run --rm seed   # inject 7 days of sample alerts
#   docker compose --profile agent up -d          # start a simulated agent
#
# Access:
#   MCP Server   → http://localhost:8000
#   Dashboard    → open ../dashboard/index.html (point to http://localhost:8000)
#   Wazuh UI     → https://localhost  (admin / SecureDemo@123)
#
# Notes:
#   • Wazuh does NOT ship a standalone Docker agent image on Docker Hub.
#     The demo-agent service uses the official Ubuntu 22.04 image and installs
#     the Wazuh agent via the official apt repository (agent Dockerfile in ./agent/).
#   • Remove the `version` field — it is obsolete in modern Docker Compose.
###############################################################################

services:

  # ── Wazuh Manager ────────────────────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: demo-wazuh-manager
    hostname: wazuh-manager
    restart: unless-stopped
    environment:
      INDEXER_URL:                    https://wazuh-indexer:9200
      INDEXER_USERNAME:               admin
      INDEXER_PASSWORD:               SecureDemo@123
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES:    /etc/ssl/root-ca.pem
      SSL_CERTIFICATE:                /etc/ssl/wazuh-manager.pem
      SSL_KEY:                        /etc/ssl/wazuh-manager-key.pem
      API_USERNAME:                   wazuh-wui
      API_PASSWORD:                   "MyS3cr37P450r.*-"
    ports:
      - "55000:55000"    # Manager REST API
      - "1514:1514/udp"  # Agent communication (syslog/event forwarding)
      - "1514:1514/tcp"  # Agent communication (TCP)
      - "1515:1515"      # Agent auto-enrollment
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-etc:/var/ossec/etc
      - wazuh-manager-integrations:/var/ossec/integrations
      - wazuh-manager-active-response:/var/ossec/active-response/bin
      - wazuh-manager-agentless:/var/ossec/agentless
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u wazuh-wui:'MyS3cr37P450r.*-' https://localhost:55000/ | grep -q 'api_version'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ── Wazuh Indexer (OpenSearch) ───────────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    container_name: demo-wazuh-indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - wazuh-indexer-config:/usr/share/wazuh-indexer/config
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:SecureDemo@123 https://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Wazuh Dashboard ──────────────────────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.5
    container_name: demo-wazuh-dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    environment:
      INDEXER_USERNAME:   admin
      INDEXER_PASSWORD:   SecureDemo@123
      WAZUH_API_URL:      https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: kibanaserver
      API_USERNAME:       wazuh-wui
      API_PASSWORD:       "MyS3cr37P450r.*-"
    ports:
      - "443:5601"
    volumes:
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    networks:
      - wazuh-net

  # ── Wazuh MCP Server ─────────────────────────────────────────────────────────
  wazuh-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: demo-wazuh-mcp
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    environment:
      # ── Manager API ──────────────────────────────────────────────────────────
      WAZUH_HOST:          https://wazuh-manager:55000
      WAZUH_USER:          wazuh-wui
      WAZUH_PASS:          "MyS3cr37P450r.*-"
      # ── Indexer ──────────────────────────────────────────────────────────────
      WAZUH_INDEXER_HOST:  https://wazuh-indexer:9200
      WAZUH_INDEXER_USER:  admin
      WAZUH_INDEXER_PASS:  SecureDemo@123
      # ── Transport ────────────────────────────────────────────────────────────
      WAZUH_MCP_TRANSPORT: http
      WAZUH_MCP_HOST:      0.0.0.0
      WAZUH_MCP_PORT:      "8000"
      # ── Demo security (no TLS, no auth, read-only) ────────────────────────
      WAZUH_VERIFY_SSL:    "false"
      WAZUH_ALLOW_WRITES:  "false"
      WAZUH_MCP_USER_ROLE: analyst
    ports:
      - "8000:8000"
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Demo Agent ───────────────────────────────────────────────────────────────
  # Wazuh does NOT publish a standalone agent image on Docker Hub.
  # This service builds a minimal Ubuntu 22.04 container that installs the
  # Wazuh agent via the official apt repository and enrolls automatically.
  # Profile: agent  (optional — seed data alone is enough for MCP demos)
  demo-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
      args:
        WAZUH_VERSION: "4.14.5"
    container_name: demo-agent
    hostname: web-server-01
    restart: unless-stopped
    environment:
      WAZUH_MANAGER:    wazuh-manager
      WAZUH_AGENT_NAME: web-server-01
      WAZUH_AGENT_GROUP: demo
    depends_on:
      wazuh-manager:
        condition: service_healthy
    networks:
      - wazuh-net
    profiles:
      - agent   # opt-in: docker compose --profile agent up -d

  # ── Seed script (one-shot data injection) ────────────────────────────────────
  # Injects 7 days of realistic alert history — 10 alert types, 5 agents,
  # MITRE ATT&CK coverage, malicious IPs, day/night volume patterns.
  # Run: docker compose --profile seed run --rm seed
  seed:
    image: python:3.11-slim
    container_name: demo-seed
    command: python /seed/seed_alerts.py
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    environment:
      INDEXER_URL:  https://wazuh-indexer:9200
      INDEXER_USER: admin
      INDEXER_PASS: SecureDemo@123
    volumes:
      - ./:/seed:ro
    networks:
      - wazuh-net
    profiles:
      - seed   # opt-in: docker compose --profile seed run --rm seed

volumes:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-etc:
  wazuh-manager-integrations:
  wazuh-manager-active-response:
  wazuh-manager-agentless:
  wazuh-indexer-data:
  wazuh-indexer-config:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:

networks:
  wazuh-net:
    driver: bridge
