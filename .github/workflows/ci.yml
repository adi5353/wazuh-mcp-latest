name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: pip install ruff mypy httpx types-python-dateutil
      - name: ruff check
        run: ruff check wazuh_mcp
      - name: mypy
        run: mypy wazuh_mcp --ignore-missing-imports --no-error-summary

  # ── 2. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security deps
        run: pip install bandit pip-audit
      - name: bandit SAST
        run: bandit -r wazuh_mcp -c pyproject.toml
      - name: pip-audit
        # Audit the pinned closure for known CVEs.
        run: pip-audit --requirement requirements.lock

  # ── 3. Unit tests + coverage gate ─────────────────────────────────────────
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest \
            --cov=wazuh_mcp \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=35 \
            -q \
            --ignore=tests/test_roi_autonomous.py
        env:
          WAZUH_HOST: http://localhost:55000
          WAZUH_USER: admin
          WAZUH_PASS: admin
          WAZUH_INDEXER_HOST: http://localhost:9200
          WAZUH_INDEXER_PASS: admin
          WAZUH_WORKSPACE_DIR: ${{ runner.temp }}/workspaces
          WAZUH_AUDIT_LOG: ${{ runner.temp }}/audit.jsonl
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  # ── 4. Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wazuh-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── L5: Supply-chain: Trivy image scan ────────────────────────────────────
  trivy:
    name: Trivy image scan (SBOM + CVE)
    runs-on: ubuntu-latest
    needs: docker
    # Only block on HIGH/CRITICAL; UNKNOWN/LOW are informational.
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wazuh-mcp:scan
          load: true
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: wazuh-mcp:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: wazuh-mcp:scan
          format: cyclonedx
          output: sbom.cdx.json
        continue-on-error: true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  # ── 5. Smoke tests against containerised Wazuh (on PR merge only) ─────────
  integration:
    name: Integration smoke tests
    runs-on: ubuntu-latest
    # Only run on push to main/master to keep PR CI fast
    if: github.event_name == 'push'
    services:
      wazuh-mock:
        image: python:3.11-slim
        options: --health-cmd "python -c 'import sys; sys.exit(0)'" --health-interval 5s
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: pip install -e ".[dev]"
      - name: Run integration-tagged tests (skipped if none exist)
        run: |
          pytest -m integration -q --no-header 2>/dev/null \
            || echo "No integration tests found — add @pytest.mark.integration to smoke tests"
        env:
          WAZUH_HOST: http://localhost:55000
          WAZUH_USER: admin
          WAZUH_PASS: admin
          WAZUH_INDEXER_HOST: http://localhost:9200
          WAZUH_INDEXER_PASS: admin
          WAZUH_AUDIT_LOG: ${{ runner.temp }}/audit.jsonl
