name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: pip install ruff mypy httpx types-python-dateutil
      - name: ruff check
        run: ruff check wazuh_mcp
      - name: mypy
        # Config in pyproject ([tool.mypy]) enables check_untyped_defs so this
        # actually checks function bodies instead of reporting a hollow "Success".
        run: mypy wazuh_mcp

  # ── 2. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security deps
        run: pip install bandit pip-audit
      - name: bandit SAST
        run: bandit -r wazuh_mcp -c pyproject.toml
      - name: pip-audit
        # Audit the pinned closure for known CVEs.
        run: pip-audit --requirement requirements.lock

  # ── 3. Unit tests + coverage gate ─────────────────────────────────────────
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project + dev deps
        run: pip install -e ".[dev]"
      - name: Run behaviour tests with coverage (honest gate)
        # Coverage gate is measured over behaviour-asserting tests only.
        # `-m "not smoke"` (from pyproject addopts) excludes the coverage-padding
        # suites so the gate reflects real verified surface. Ratchet --cov-fail-under
        # UP as honest coverage improves; never lower it to make CI pass.
        run: |
          pytest \
            --cov=wazuh_mcp \
            --cov-report=term-missing \
            --cov-report=xml \
            -q \
            --ignore=tests/test_roi_autonomous.py
        env:
          WAZUH_HOST: http://localhost:55000
          WAZUH_USER: admin
          WAZUH_PASS: admin
          WAZUH_INDEXER_HOST: http://localhost:9200
          WAZUH_INDEXER_PASS: admin
          WAZUH_WORKSPACE_DIR: ${{ runner.temp }}/workspaces
          WAZUH_AUDIT_LOG: ${{ runner.temp }}/audit.jsonl
      - name: Run smoke tests (crash/import guard, not gated)
        # The quarantined breadth suites still run so a broad breakage trips CI,
        # but they do NOT contribute to the coverage gate.
        run: pytest -m smoke -q --no-cov --ignore=tests/test_roi_autonomous.py
        env:
          WAZUH_HOST: http://localhost:55000
          WAZUH_USER: admin
          WAZUH_PASS: admin
          WAZUH_INDEXER_HOST: http://localhost:9200
          WAZUH_INDEXER_PASS: admin
          WAZUH_WORKSPACE_DIR: ${{ runner.temp }}/workspaces
          WAZUH_AUDIT_LOG: ${{ runner.temp }}/audit.jsonl
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  # ── 4. Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wazuh-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── L5: Supply-chain: Trivy image scan ────────────────────────────────────
  trivy:
    name: Trivy image scan (SBOM + CVE)
    runs-on: ubuntu-latest
    needs: docker
    # Only block on HIGH/CRITICAL; UNKNOWN/LOW are informational.
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wazuh-mcp:scan
          load: true
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wazuh-mcp:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wazuh-mcp:scan
          format: cyclonedx
          output: sbom.cdx.json
        continue-on-error: true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  # ── 5. Live integration tests against a real Wazuh stack (push to main only) ─
  # Stands up the canonical wazuh/wazuh-docker single-node stack (manager +
  # indexer) and runs the `-m integration` contract tests against it. Runs on
  # push only to keep PR CI fast; a real backend is heavy to provision.
  integration:
    name: Integration (live Wazuh)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 30
    env:
      # Pinned upstream stack + its documented single-node default credentials.
      WAZUH_DOCKER_REF: v4.9.2
      WAZUH_HOST: https://localhost:55000
      WAZUH_USER: wazuh-wui
      WAZUH_PASS: MyS3cr37P450r.*-
      WAZUH_INDEXER_HOST: https://localhost:9200
      WAZUH_INDEXER_USER: admin
      WAZUH_INDEXER_PASS: SecretPassword
      WAZUH_VERIFY_SSL: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project + dev deps
        run: pip install -e ".[dev]"
      - name: Raise vm.max_map_count for the Indexer (OpenSearch)
        run: sudo sysctl -w vm.max_map_count=262144
      - name: Check out wazuh-docker single-node stack
        run: git clone --depth 1 -b "$WAZUH_DOCKER_REF" https://github.com/wazuh/wazuh-docker.git
      - name: Generate Indexer certificates
        working-directory: wazuh-docker/single-node
        run: docker compose -f generate-indexer-certs.yml run --rm generator
      - name: Start Wazuh manager + indexer
        working-directory: wazuh-docker/single-node
        run: docker compose up -d wazuh.manager wazuh.indexer
      - name: Wait for Manager API to accept auth
        run: |
          for i in $(seq 1 60); do
            if curl -sk -u "$WAZUH_USER:$WAZUH_PASS" \
                 "$WAZUH_HOST/security/user/authenticate" | grep -q token; then
              echo "Wazuh Manager API is ready"; exit 0
            fi
            echo "waiting for Manager API ($i/60)…"; sleep 10
          done
          echo "::error::Manager API never became ready"
          docker compose -f wazuh-docker/single-node/docker-compose.yml logs --tail=120 || true
          exit 1
      - name: Run live integration tests
        run: pytest -m integration --no-cov -v
      - name: Dump stack logs on failure
        if: failure()
        working-directory: wazuh-docker/single-node
        run: docker compose logs --tail=200 || true
      - name: Tear down stack
        if: always()
        working-directory: wazuh-docker/single-node
        run: docker compose down -v || true
