name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: pip install ruff mypy httpx types-python-dateutil
      - name: ruff check
        run: ruff check wazuh_mcp
      - name: mypy
        run: mypy wazuh_mcp --ignore-missing-imports --no-error-summary

  # ── 2. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security deps
        run: pip install bandit pip-audit
      - name: bandit SAST
        run: bandit -r wazuh_mcp -c pyproject.toml
      - name: pip-audit
        run: pip-audit --requirement requirements.txt

  # ── 3. Unit tests + coverage gate ─────────────────────────────────────────
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=wazuh_mcp --cov-fail-under=70 -q
        env:
          # Minimal env so Config.from_env() doesn't raise on import
          WAZUH_HOST: http://localhost:55000
          WAZUH_USER: admin
          WAZUH_PASS: admin
          WAZUH_INDEXER_HOST: http://localhost:9200
          WAZUH_INDEXER_PASS: admin

  # ── 4. Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: wazuh-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
